<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Variables</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/style/crm-common.css">
    <link rel="stylesheet" href="/style/variables.css">
</head>
<body data-theme="light">
    <!-- Navbar lateral -->
    <div id="navbar">
        <a href="dashboard.html" class="nav-item" id="nav-dashboard" title="Panel General">
            <i class="fas fa-chart-line"></i>
            <span>Dashboard</span>
        </a>
        <a href="backoffice.html" class="nav-item" id="nav-backoffice" title="Chats & CRM">
            <i class="fas fa-comment-dots"></i>
            <span>Chats</span>
        </a>
        <a href="variables.html" class="nav-item" id="nav-variables" title="Configuración">
            <i class="fas fa-cog"></i>
            <span>Ajustes</span>
        </a>
        <div class="nav-item" id="theme-toggle" title="Cambiar Tema">
            <i class="fas fa-moon"></i>
            <span>Tema</span>
        </div>
        <div class="nav-item" id="nav-logout" title="Cerrar Sesión" style="margin-top: 20px; color: #f87171;">
            <i class="fas fa-sign-out-alt"></i>
            <span>Salir</span>
        </div>
    </div>

    <!-- Contenedor principal -->
    <div class="crm-main-container">
        <div class="container glass-card">
            <h1>⚙️ Editar Variables de Entorno</h1>
            <!-- ... (formulario abreviado) ... -->
            <form id="variables-form">
                <!-- OpenAI Section -->
                <div class="section-header">
                    <h2>🤖 Configuración OpenAI</h2>
                </div>
                <div class="variables-grid" id="openai-grid"></div>

                <!-- Messages Section -->
                <div class="section-header">
                    <h2>💬 Mensajes y Tiempos de Cierre</h2>
                </div>
                <div class="variables-grid" id="messages-grid"></div>

                <!-- Google Section -->
                <div class="section-header">
                    <h2>🌐 Servicios de Google</h2>
                </div>
                <div class="variables-grid" id="google-grid"></div>

                <!-- Supabase Section -->
                <div class="section-header">
                    <h2>⚡ Supabase</h2>
                </div>
                <div class="variables-grid" id="supabase-grid"></div>

                <div class="actions">
                    <button type="button" id="cancel-btn" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" id="update-btn" class="btn btn-primary">Actualizar y Reiniciar</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/js/crm-common.js"></script>
    <script src="/js/variables.js"></script>
</body>
</html>
