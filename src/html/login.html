<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema - {{BOT_NAME}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Usamos el estilo común del CRM si existe para coherencia -->
    <link rel="stylesheet" href="/style/crm-common.css">
    <link rel="stylesheet" href="/style/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="light">
    
    <div class="login-container">
        <div class="login-card animate-pop">
            <div class="login-header">
                <div class="bot-logo">🤖</div>
                <h1>{{BOT_NAME}}</h1>
                <p>Centro de Gestión y CRM</p>
            </div>

            <div class="login-form">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Usuario / Token</label>
                    <input type="text" id="user" placeholder="Nombre de usuario o Master Token" autofocus>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="pass" placeholder="••••••••">
                </div>

                <div id="error" class="error-message" style="display:none;">
                    <i class="fas fa-exclamation-triangle"></i> <span>Credenciales inválidas</span>
                </div>

                <button id="login-btn" onclick="login()" class="btn-login">
                    <span>Entrar al Sistema</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <div class="login-footer">
                <p>&copy; 2024 {{BOT_NAME}} - Advanced AI Bot</p>
            </div>
        </div>
    </div>

    <script src="/js/login.js"></script>
    <script>
        // Permitir login con Enter en cualquier campo
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') login();
            });
        });
    </script>
</body>
</html>
