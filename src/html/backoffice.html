<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Backoffice - {{ASSISTANT_NAME}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style/backoffice.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="chat-avatar" id="user-avatar-placeholder">
                <span>👤</span>
            </div>
            <div class="sidebar-header-actions">
                <button id="toggle-tag-manager-btn" class="btn-icon" title="Gestionar Etiquetas">🏷️</button>
                <div class="header-spacer"></div>
                <button id="logout-btn" class="btn-icon logout-btn">Salir</button>
            </div>
        </div>
        <div class="search-container">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" class="search-input" placeholder="Buscar o empezar un nuevo chat">
            </div>
            <div class="search-wrapper filter-container">
                <span class="filter-icon">🏷️</span>
                <select id="filter-tag" class="search-input filter-select">
                    <option value="">Todas las etiquetas</option>
                </select>
            </div>
        </div>
        <div id="chat-list">
            <!-- Cargando hilos... -->
        </div>
    </div>

    <div id="main-content">
        <div id="chat-header">
            <div class="header-user">
                <div id="active-chat-avatar" class="chat-avatar">?</div>
                <div class="chat-info">
                    <div id="active-chat-phone" class="chat-phone">Selecciona un chat</div>
                    <div id="active-chat-name" class="chat-name-small">---</div>
                    <div id="active-chat-tags" class="active-chat-tags"></div>
                </div>
            </div>
            <div class="intervention-status">
                <div class="switch-container">
                    <span id="bot-status-text">Bot Activo</span>
                    <label class="switch">
                        <input type="checkbox" id="bot-toggle" disabled>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <div id="messages">
            <!-- Mensajes aquí -->
        </div>

        <div id="input-area">
            <input type="file" id="file-input" class="hidden-input">
            <button class="btn-icon" id="attach-btn" disabled>📎</button>
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="Escribe un mensaje aquí" disabled>
            </div>
            <button class="btn-icon send-btn-active" id="send-btn" disabled>
                <span class="send-icon">➤</span>
            </button>
        </div>
    </div>

    <div id="tag-manager">
        <div class="tag-manager-header">
            <button id="close-tag-manager-btn" class="btn-icon">✕</button>
            <h3 class="tag-manager-title">Etiquetas</h3>
        </div>
        
        <div class="tag-manager-content">
            <div class="tag-creation-box">
                <h4 class="tag-section-title">Nueva Etiqueta</h4>
                <input type="text" id="new-tag-name" class="search-input new-tag-input" placeholder="Nombre">
                <div class="new-tag-controls">
                    <input type="color" id="new-tag-color" class="new-tag-color" value="#00a884">
                    <button id="create-tag-btn" class="btn-icon create-tag-btn">Crear</button>
                </div>
            </div>

            <div id="tag-list-editor">
                <!-- Lista de etiquetas para editar -->
            </div>

            <div id="current-chat-tags-section" class="assign-tags-section" style="display:none;">
                <h4 class="tag-section-title">Asignar a este chat</h4>
                <div id="available-tags-to-assign" class="assign-tags-list">
                    <!-- Etiquetas disponibles para asignar -->
                </div>
            </div>
        </div>
    </div>

    <script src="/js/backoffice.js"></script>
</body>
</html>
